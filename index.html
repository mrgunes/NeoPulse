<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoPulse — Progress Display</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #07080d;
      --surface:     #0d0f18;
      --surface2:    #131620;
      --surface3:    #191d2b;
      --border:      #1c2133;
      --border2:     #242a3e;
      --accent:      #00c8ef;
      --accent-glow: rgba(0, 200, 239, 0.12);
      --accent-dim:  rgba(0, 200, 239, 0.5);
      --purple:      #7c5cfc;
      --green:       #22d47a;
      --red:         #f14444;
      --text:        #dde3ef;
      --text-dim:    #8a96b0;
      --text-muted:  #4c566a;
      --mono:        'JetBrains Mono', 'Consolas', monospace;
      --sans:        'Inter', -apple-system, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ── TOPBAR ───────────────────────────────────────── */
    .topbar {
      height: 50px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logo-pulse {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: beat 2.2s ease-in-out infinite;
    }

    @keyframes beat {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.25; transform: scale(0.7); }
    }

    .sep { width: 1px; height: 18px; background: var(--border2); }

    .topbar-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .spacer { flex: 1; }

    .btn-upload {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .btn-upload:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn-upload svg { width: 13px; height: 13px; }
    #fileInput { display: none; }

    /* ── LAYOUT ───────────────────────────────────────── */
    .layout { display: flex; height: calc(100vh - 50px); }

    /* ── SIDEBAR ──────────────────────────────────────── */
    .sidebar {
      width: 268px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-label {
      padding: 13px 18px 10px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── STAGES ───────────────────────────────────────── */
    .stages-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }

    .stage-wrap {
      border-bottom: 1px solid transparent;
    }

    .stage-wrap.is-open {
      border-bottom-color: var(--border);
      background: rgba(0,0,0,0.15);
    }

    .stage-hd {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 14px 9px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s;
      user-select: none;
    }

    .stage-hd:hover { background: var(--surface3); }

    .stage-wrap.is-current > .stage-hd {
      border-left-color: var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
    }

    .stage-wrap.is-open > .stage-hd { background: rgba(0,0,0,0.1); }

    .stage-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      padding-top: 3px;
      min-width: 14px;
    }

    .stage-body { flex: 1; min-width: 0; }

    .stage-title-row { display: flex; align-items: center; gap: 6px; }

    .stage-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      line-height: 1.3;
      flex: 1;
    }

    .stage-wrap.is-current .stage-title { color: var(--accent); }

    .stage-count {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
    }

    .stage-count.all-done { color: var(--green); }
    .stage-count.partial  { color: var(--accent); }

    .stage-sub {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .stage-pbar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 6px;
      overflow: hidden;
    }

    .stage-pbar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    .stage-wrap.is-current .stage-pbar-fill { background: var(--accent); }

    .stage-chevron {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      margin-top: 1px;
      transition: transform 0.18s ease;
    }

    .stage-wrap.is-open .stage-chevron { transform: rotate(90deg); }

    .pill {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 600;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .pill-done    { background: rgba(34,212,122,0.12); color: var(--green); }
    .pill-current { background: rgba(0,200,239,0.14);  color: var(--accent); animation: beat 2.2s ease-in-out infinite; }
    .pill-todo    { background: rgba(76,86,106,0.18);  color: var(--text-muted); }

    /* ── SUBTASK PANEL ────────────────────────────────── */
    .stage-tasks {
      display: none;
      flex-direction: column;
      padding: 4px 0 8px;
      border-top: 1px solid var(--border);
    }

    .stage-wrap.is-open .stage-tasks { display: flex; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px 5px 36px;
      transition: background 0.1s;
    }

    .task-item:hover { background: var(--surface3); }

    .task-cb {
      width: 13px; height: 13px;
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--border2);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }

    .task-cb:checked { background: var(--green); border-color: var(--green); }

    .task-cb:checked::after {
      content: '';
      position: absolute;
      left: 2px; top: 0px;
      width: 5px; height: 8px;
      border: 1.5px solid #07080d;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .stage-wrap.is-current .task-cb:checked { background: var(--accent); border-color: var(--accent); }

    .task-text {
      font-size: 11.5px;
      color: var(--text-dim);
      flex: 1;
      line-height: 1.4;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-empty {
      padding: 8px 14px 4px 36px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── HISTORY PANEL ────────────────────────────────── */
    .history-panel { border-top: 1px solid var(--border); flex-shrink: 0; }
    .history-scroll { max-height: 170px; overflow-y: auto; }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 2px solid transparent;
    }

    .hist-item:hover { background: var(--surface2); }

    .hist-item.active {
      border-left-color: var(--purple);
      background: rgba(124,92,252,0.06);
    }

    .hist-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hist-item.active .hist-name { color: var(--purple); }

    .hist-del {
      font-size: 15px;
      line-height: 1;
      color: var(--text-muted);
      opacity: 0;
      cursor: pointer;
      transition: color 0.1s, opacity 0.1s;
      flex-shrink: 0;
    }

    .hist-item:hover .hist-del { opacity: 1; }
    .hist-del:hover { color: var(--red) !important; }

    .hist-empty {
      padding: 10px 18px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── MAIN AREA ────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      cursor: pointer;
      padding: 40px;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .drop-zone.over { background: rgba(0,200,239,0.04); }

    /* Subtle corner brackets when dragging over */
    .drop-zone.over::before, .drop-zone.over::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--accent-dim);
      border-style: solid;
      opacity: 0.5;
    }
    .drop-zone.over::before { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
    .drop-zone.over::after  { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

    /* ── MOTIVATIONAL DASHBOARD ── */
    .motiv {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 600px;
    }

    /* Stage tag */
    .motiv-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* Pipeline nodes */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      width: 100%;
      justify-content: center;
    }

    .pip-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      flex: 1;
      max-width: 64px;
    }

    .pip-circle {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: var(--bg);
      position: relative;
      z-index: 1;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }

    .pip-node.done   .pip-circle { background: var(--green);  border-color: var(--green);  box-shadow: 0 0 8px rgba(34,212,122,0.3); }
    .pip-node.current .pip-circle { background: transparent; border-color: var(--accent); box-shadow: 0 0 14px rgba(0,200,239,0.4); }
    .pip-node.current .pip-circle::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: beat 2.2s ease-in-out infinite;
    }
    .pip-node.done .pip-circle::after {
      content: '';
      width: 6px; height: 9px;
      border: 1.5px solid #07080d;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .pip-label {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 58px;
      text-align: center;
    }

    .pip-node.done    .pip-label { color: var(--green); }
    .pip-node.current .pip-label { color: var(--accent); }

    .pip-line {
      flex: 1;
      height: 1px;
      background: var(--border2);
      margin-bottom: 22px;
      max-width: 28px;
    }

    .pip-line.done-line { background: var(--green); opacity: 0.4; }

    /* Stats row */
    .motiv-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }

    .motiv-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .motiv-stat-val {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .motiv-stat-val.green  { color: var(--green); }
    .motiv-stat-val.accent { color: var(--accent); }
    .motiv-stat-val.muted  { color: var(--text-muted); }

    .motiv-stat-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .motiv-divider {
      width: 1px;
      height: 32px;
      background: var(--border2);
      align-self: center;
    }

    /* Headline */
    .motiv-headline {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }

    /* ── EKG EFFECT ── */
    .motiv-ekg {
      position: relative;
      width: 380px;
      height: 80px;
      margin-bottom: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .motiv-ekg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        var(--bg) 0%,
        transparent 22%,
        transparent 68%,
        var(--bg) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    .ekg-svg {
      position: absolute;
      left: 0; top: 0;
      width: 760px;
      height: 80px;
      animation: ekg-scroll 3.2s linear infinite;
    }

    @keyframes ekg-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-380px); }
    }

    .ekg-path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 2px var(--accent)) drop-shadow(0 0 8px rgba(0,200,239,0.5));
    }

    .ekg-baseline {
      stroke: rgba(0,200,239,0.07);
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 4 6;
    }

    .motiv-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      max-width: 420px;
      margin-bottom: 44px;
    }

    /* Drop hint */
    .dz-hint-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover .dz-hint-row,
    .drop-zone.over  .dz-hint-row {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
    }

    .dz-hint-icon { width: 14px; height: 14px; color: var(--text-muted); }
    .drop-zone:hover .dz-hint-icon,
    .drop-zone.over  .dz-hint-icon { color: var(--accent); }

    .dz-hint-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .drop-zone:hover .dz-hint-text,
    .drop-zone.over  .dz-hint-text { color: var(--accent); }

    .content-wrap { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .content-wrap.show { display: flex; }

    .content-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .ct-file   { font-family: var(--mono); font-size: 12px; color: var(--purple); }
    .ct-loaded { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-left: auto; }

    .content-scroll { flex: 1; overflow-y: auto; padding: 36px 40px; }

    /* ── MARKDOWN ─────────────────────────────────────── */
    .md h1 { font-size: 22px; font-weight: 700; color: var(--text); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 20px; line-height: 1.3; }
    .md h2 { font-size: 14px; font-weight: 600; color: var(--accent); font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; margin: 32px 0 12px; }
    .md h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 22px 0 8px; }
    .md h4 { font-size: 13px; font-weight: 600; color: var(--text-dim); margin: 16px 0 6px; }
    .md p  { font-size: 13.5px; line-height: 1.75; color: var(--text-dim); margin-bottom: 12px; }
    .md ul, .md ol { margin: 6px 0 14px 22px; }
    .md li { font-size: 13.5px; line-height: 1.7; color: var(--text-dim); margin-bottom: 4px; }
    .md li::marker { color: var(--text-muted); }
    .md code { font-family: var(--mono); font-size: 12px; background: var(--surface3); color: var(--accent); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border2); }
    .md pre { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 16px 18px; overflow-x: auto; margin: 14px 0; }
    .md pre code { background: none; border: none; padding: 0; font-size: 12.5px; color: var(--text-dim); }
    .md blockquote { margin: 16px 0; padding: 10px 18px; border-left: 3px solid var(--accent); background: var(--accent-glow); border-radius: 0 5px 5px 0; }
    .md blockquote p { margin: 0; font-style: italic; color: var(--text-dim); }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .md table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
    .md th { text-align: left; padding: 8px 14px; background: var(--surface2); color: var(--text-muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border2); }
    .md td { padding: 8px 14px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-size: 13px; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md strong { color: var(--text); font-weight: 600; }
    .md em { color: var(--text-dim); }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-pulse"></div>
    NeoPulse
  </div>
  <div class="sep"></div>
  <div class="topbar-label">Progress Display</div>
  <div class="spacer"></div>
  <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Load .md File
  </button>
  <input type="file" id="fileInput" accept=".md,.txt" multiple>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="panel-label">Project Stages</div>
    <div class="stages-scroll" id="stagesList"></div>
    <div class="history-panel">
      <div class="panel-label">Daily Logs</div>
      <div class="history-scroll" id="historyList"></div>
    </div>
  </div>

  <div class="main" id="mainArea">
    <div class="drop-zone" id="dropZone">
      <div class="motiv" id="motivPanel"></div>
    </div>

    <div class="content-wrap" id="contentWrap">
      <div class="content-topbar">
        <span class="ct-file" id="ctFile"></span>
        <span class="ct-loaded" id="ctLoaded"></span>
      </div>
      <div class="content-scroll">
        <div class="md" id="mdBody"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── STAGES ────────────────────────────────────────────────
const STAGES = [
  { n: 0, title: 'Infrastructure',      goal: 'System runs reliably',                  status: 'done', defaultTasks: [
    { text: 'Docker stack',              done: true  },
    { text: 'LiteLLM working',           done: true  },
    { text: 'Backend API working',       done: true  },
    { text: 'DB + persistence working',  done: true  },
    { text: 'LLM integration stable',    done: true  },
  ]},
  { n: 1, title: 'Report Engine',       goal: 'Data → structured intelligence',        status: 'done', defaultTasks: [
    { text: 'Report generation',         done: true  },
    { text: 'JSON parsing',              done: true  },
    { text: 'Recommendation extraction', done: true  },
    { text: 'Priority normalization',    done: true  },
    { text: 'Persistence',               done: true  },
    { text: 'Quality scoring',           done: true  },
  ]},
  { n: 2, title: 'Data Pipeline',       goal: 'Make inputs real and reliable',         status: 'current', defaultTasks: [
    { text: 'Normalization not implemented', done: false },
    { text: 'Embeddings missing',            done: false },
    { text: 'Ingestion not wired',           done: false },
    { text: 'Retrieval empty',               done: false },
  ]},
  { n: 3, title: 'Memory & Retrieval',  goal: 'System understands history',            status: 'todo', defaultTasks: [
    { text: 'Vector search',             done: false },
    { text: 'Event similarity',          done: false },
    { text: 'Cross-day reasoning',       done: false },
    { text: 'Trend detection',           done: false },
  ]},
  { n: 4, title: 'Action Engine',       goal: 'System does things, not just suggests', status: 'todo', defaultTasks: [
    { text: 'Task creation',             done: false },
    { text: 'Reminders',                 done: false },
    { text: 'GitHub actions',            done: false },
    { text: 'Calendar updates',          done: false },
    { text: 'n8n integration',           done: false },
  ]},
  { n: 5, title: 'Feedback Loop',       goal: 'System learns what matters',            status: 'todo', defaultTasks: [
    { text: 'Track which actions you follow', done: false },
    { text: 'Track which you ignore',         done: false },
    { text: 'Impact of decisions',            done: false },
  ]},
  { n: 6, title: 'Interface / Product', goal: 'Make it usable',                        status: 'todo', defaultTasks: [
    { text: 'Dashboard',                 done: false },
    { text: 'Daily reports UI',          done: false },
    { text: 'Progress tracking',         done: false },
    { text: 'Action control panel',      done: false },
  ]},
  { n: 7, title: 'Autonomy',            goal: 'System acts with minimal input',        status: 'todo', defaultTasks: [
    { text: 'Auto-execute safe actions', done: false },
    { text: 'Proactive decisions',       done: false },
    { text: 'Scheduling optimization',   done: false },
  ]},
];

const PILL = {
  done:    '<span class="pill pill-done">DONE</span>',
  current: '<span class="pill pill-current">HERE</span>',
  todo:    '<span class="pill pill-todo">NEXT</span>',
};

// ── STATE ─────────────────────────────────────────────────
const OPEN_KEY   = 'neopulse_open_v1';
const CHECK_KEY  = 'neopulse_checks_v1';
const LOGS_KEY   = 'neopulse_logs_v1';

let openStages  = {};   // { [n]: bool }
let checkStates = {};   // { [filename]: { ["n::text"]: bool } }
let activeTasks = {};   // { [n]: [{text, done}] } — from current md file
let activeFile  = null; // current filename
let logs        = [];
let activeIdx   = null;

function loadStorage() {
  try { openStages  = JSON.parse(localStorage.getItem(OPEN_KEY)  || '{}'); } catch { openStages  = {}; }
  try { checkStates = JSON.parse(localStorage.getItem(CHECK_KEY) || '{}'); } catch { checkStates = {}; }
  try { logs        = JSON.parse(localStorage.getItem(LOGS_KEY)  || '[]'); } catch { logs        = []; }
}

function saveOpen()   { localStorage.setItem(OPEN_KEY,  JSON.stringify(openStages));  }
function saveChecks() { localStorage.setItem(CHECK_KEY, JSON.stringify(checkStates)); }
function saveLogs()   { localStorage.setItem(LOGS_KEY,  JSON.stringify(logs));        }

// ── MD PARSER ─────────────────────────────────────────────
// Recognises:
//   # Stage 2 ...  or  ## Stage 2 ...  (starts a stage block)
//   - [x] Task     (checked task)
//   - [ ] Task     (unchecked task)
//   * Task         (plain bullet → unchecked task)
//   - Task         (plain bullet → unchecked task)
function parseTasksFromMd(content) {
  const result = {};
  const lines  = content.split('\n');
  let cur = null;

  // Patterns
  const stageRe  = /^#{1,3}\s+Stage\s+(\d+)/i;
  const majorRe  = /^#{1,2}\s+(?!Stage\s+\d)/i;   // h1/h2 that is NOT a stage heading
  const checkRe  = /^\s*[-*]\s+\[([xX ])\]\s+(.+)/;
  const bulletRe = /^\s*[-*]\s+(?!\[)(.+)/;

  // Lines to skip even inside a stage block
  const skipRe = /^(👉|Output:|What you|What'?s\s+missing|What\s+you\s+built|You will|You are|Only focus|Nothing else|This is)/i;

  for (const raw of lines) {
    const line = raw.trimEnd();

    // Stage heading → enter that stage
    const stageM = line.match(stageRe);
    if (stageM) {
      cur = parseInt(stageM[1]);
      if (!result[cur]) result[cur] = [];
      continue;
    }

    // Major non-stage heading → leave stage context
    if (majorRe.test(line)) { cur = null; continue; }

    if (cur === null) continue;

    // - [x] / - [ ]
    const cbM = line.match(checkRe);
    if (cbM) {
      result[cur].push({ text: cbM[2].trim(), done: cbM[1].toLowerCase() === 'x' });
      continue;
    }

    // Plain bullet
    const bM = line.match(bulletRe);
    if (bM) {
      const text = bM[1].trim();
      if (text && !skipRe.test(text) && text.length > 2) {
        result[cur].push({ text, done: false });
      }
    }
  }

  return result;
}

// ── RENDER STAGES (skeleton, once) ───────────────────────
function renderStages() {
  document.getElementById('stagesList').innerHTML = STAGES.map(s => `
    <div class="stage-wrap ${s.status === 'current' ? 'is-current' : ''} ${s.status === 'done' ? 'is-done' : ''} ${openStages[s.n] ? 'is-open' : ''}" id="sw-${s.n}">
      <div class="stage-hd" onclick="toggleStage(${s.n})">
        <div class="stage-num">${s.n}</div>
        <div class="stage-body">
          <div class="stage-title-row">
            <div class="stage-title">${s.title}</div>
            <span class="stage-count" id="sc-${s.n}"></span>
          </div>
          <div class="stage-sub">${s.goal}</div>
          <div class="stage-pbar" id="spb-${s.n}" style="display:none">
            <div class="stage-pbar-fill" id="spbf-${s.n}" style="width:0%"></div>
          </div>
        </div>
        ${PILL[s.status]}
        <div class="stage-chevron">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,2 7,5 3,8"/>
          </svg>
        </div>
      </div>
      <div class="stage-tasks" id="st-${s.n}">
        <div class="task-list" id="tl-${s.n}"></div>
      </div>
    </div>
  `).join('');

  STAGES.forEach(s => refreshStageUI(s.n));
}

// ── REFRESH ONE STAGE ─────────────────────────────────────
function refreshStageUI(n) {
  const stage  = STAGES.find(s => s.n === n);
  const list   = activeTasks[n] !== undefined ? activeTasks[n] : (stage.defaultTasks || []);
  const total  = list.length;
  const done  = list.filter(t => t.done).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;

  // Counter
  const sc = document.getElementById('sc-' + n);
  if (sc) {
    sc.textContent = total ? `${done}/${total}` : '';
    sc.className   = 'stage-count' + (total === 0 ? '' : done === total ? ' all-done' : ' partial');
  }

  // Progress bar
  const spb  = document.getElementById('spb-'  + n);
  const spbf = document.getElementById('spbf-' + n);
  if (spb)  spb.style.display = total ? 'block' : 'none';
  if (spbf) spbf.style.width  = pct + '%';

  // Task list
  const tl = document.getElementById('tl-' + n);
  if (!tl) return;

  if (!total) {
    tl.innerHTML = '<div class="task-empty">No tasks defined for this stage</div>';
    return;
  }

  tl.innerHTML = list.map((t, i) => `
    <div class="task-item ${t.done ? 'done' : ''}">
      <input class="task-cb" type="checkbox" ${t.done ? 'checked' : ''}
        onchange="toggleTask(${n},${i},this.checked)">
      <span class="task-text">${escHtml(t.text)}</span>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOGGLE STAGE ──────────────────────────────────────────
function toggleStage(n) {
  const wrap = document.getElementById('sw-' + n);
  if (!wrap) return;
  const nowOpen = !wrap.classList.contains('is-open');
  wrap.classList.toggle('is-open', nowOpen);
  openStages[n] = nowOpen;
  saveOpen();
}

// ── TOGGLE TASK ───────────────────────────────────────────
function toggleTask(n, idx, checked) {
  const stage = STAGES.find(s => s.n === n);
  const list  = activeTasks[n] !== undefined ? activeTasks[n] : (stage.defaultTasks || []);
  if (!list[idx]) return;
  list[idx].done = checked;

  // Persist: per-file if a file is active, otherwise under '__default__'
  const fileKey = activeFile || '__default__';
  if (!checkStates[fileKey]) checkStates[fileKey] = {};
  checkStates[fileKey][`${n}::${list[idx].text}`] = checked;
  saveChecks();

  refreshStageUI(n);
  renderMotiv();
}

// ── LOAD TASKS FROM MD ────────────────────────────────────
function applyTasksFromMd(filename, content) {
  const parsed    = parseTasksFromMd(content);
  const fileChecks = checkStates[filename] || {};

  // Merge parsed tasks with saved check-state overrides
  for (const [n, list] of Object.entries(parsed)) {
    list.forEach(t => {
      const key = `${n}::${t.text}`;
      if (fileChecks[key] !== undefined) t.done = fileChecks[key];
    });
  }

  activeTasks = parsed;
  activeFile  = filename;
  STAGES.forEach(s => refreshStageUI(s.n));
}

function clearTasks() {
  activeTasks = {};
  activeFile  = null;
  STAGES.forEach(s => refreshStageUI(s.n));
}

// ── LOG HISTORY ───────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!logs.length) {
    el.innerHTML = '<div class="hist-empty">No logs loaded yet</div>';
    return;
  }
  el.innerHTML = logs.map((l, i) => `
    <div class="hist-item ${i === activeIdx ? 'active' : ''}" onclick="openLog(${i})">
      <span class="hist-name">${l.name}</span>
      <span class="hist-del" onclick="removeLog(event,${i})">×</span>
    </div>
  `).join('');
}

function openLog(i) {
  activeIdx = i;
  const l = logs[i];
  document.getElementById('ctFile').textContent   = l.name;
  document.getElementById('ctLoaded').textContent = 'loaded ' + l.ts;
  document.getElementById('mdBody').innerHTML      = marked.parse(l.content);
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('contentWrap').classList.add('show');
  applyTasksFromMd(l.name, l.content);
  renderHistory();
}

function removeLog(e, i) {
  e.stopPropagation();
  logs.splice(i, 1);
  saveLogs();
  if (activeIdx === i) {
    activeIdx = null;
    document.getElementById('dropZone').style.display = 'flex';
    document.getElementById('contentWrap').classList.remove('show');
    clearTasks();
  } else if (activeIdx > i) {
    activeIdx--;
  }
  renderHistory();
}

function addFile(name, content) {
  const now = new Date();
  const ts  = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            + ' · '
            + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const ex = logs.findIndex(l => l.name === name);
  if (ex !== -1) logs.splice(ex, 1);
  logs.unshift({ name, content, ts });
  saveLogs();
  renderHistory();
  openLog(0);
}

function handleFiles(files) {
  Array.from(files)
    .filter(f => f.name.match(/\.(md|txt)$/i))
    .forEach(f => {
      const r = new FileReader();
      r.onload = e => addFile(f.name, e.target.result);
      r.readAsText(f);
    });
}

// ── EVENTS ────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function () {
  handleFiles(this.files);
  this.value = '';
});

const mainArea = document.getElementById('mainArea');
const dropZone = document.getElementById('dropZone');

mainArea.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
mainArea.addEventListener('dragleave', ()  => dropZone.classList.remove('over'));
mainArea.addEventListener('drop',      e  => {
  e.preventDefault();
  dropZone.classList.remove('over');
  handleFiles(e.dataTransfer.files);
});
dropZone.addEventListener('click', () => document.getElementById('fileInput').click());

// ── MOTIVATIONAL DASHBOARD ────────────────────────────────
const MOTIVATION = {
  0: { headline: "The foundation holds.",         sub: "Infrastructure is live. The system breathes. Build up from here." },
  1: { headline: "Data is becoming intelligence.", sub: "Reports are structured. The engine has a voice. Now feed it real input." },
  2: { headline: "Make it real or waste time.",    sub: "Data pipeline is the critical bottleneck. Nothing else matters until this works." },
  3: { headline: "Memory separates tools from systems.", sub: "Build retrieval. Give the system a past. Let it reason across time." },
  4: { headline: "Suggestions without action are noise.", sub: "The engine needs to move. Recommendations become worthless without execution." },
  5: { headline: "A system that doesn't learn is just a script.", sub: "Close the loop. Track what you follow. Let it adapt to you." },
  6: { headline: "Power means nothing if it's unusable.", sub: "Ship the interface. Make it accessible. Bring it to the surface." },
  7: { headline: "Full autonomy. Minimal input.",  sub: "The final form. Let it run. You built this." },
};

function renderMotiv() {
  const current = STAGES.find(s => s.status === 'current') || STAGES[2];
  const msg     = MOTIVATION[current.n] || MOTIVATION[2];

  // Stage-level counts (for DONE / ACTIVE / REMAINING cards)
  const stagesDone      = STAGES.filter(s => s.status === 'done').length;
  const stagesRemaining = STAGES.filter(s => s.status === 'todo').length;

  // Subtask-level counts (for % — uses live state if file loaded, else defaults)
  let taskTotal = 0, taskDone = 0;
  STAGES.forEach(s => {
    const list = activeTasks[s.n] !== undefined ? activeTasks[s.n] : (s.defaultTasks || []);
    taskTotal += list.length;
    taskDone  += list.filter(t => t.done).length;
  });
  const pct = taskTotal ? Math.round((taskDone / taskTotal) * 100) : 0;

  // Pipeline nodes
  const pipelineHtml = STAGES.map((s, i) => {
    const cls  = s.status === 'done' ? 'done' : s.status === 'current' ? 'current' : 'todo';
    const line = i < STAGES.length - 1
      ? `<div class="pip-line ${s.status === 'done' ? 'done-line' : ''}"></div>`
      : '';
    const shortLabel = s.title.split(' ')[0]; // first word only
    return `
      <div class="pip-node ${cls}">
        <div class="pip-circle"></div>
        <div class="pip-label">${shortLabel}</div>
      </div>
      ${line}
    `;
  }).join('');

  document.getElementById('motivPanel').innerHTML = `
    <div class="motiv-tag">AI Infrastructure Blueprint · Stage ${current.n} of ${STAGES.length - 1}</div>

    <div class="pipeline">${pipelineHtml}</div>

    <div class="motiv-stats">
      <div class="motiv-stat">
        <div class="motiv-stat-val green">${stagesDone}</div>
        <div class="motiv-stat-lbl">Stages Done</div>
      </div>
      <div class="motiv-divider"></div>
      <div class="motiv-stat">
        <div class="motiv-stat-val accent">1</div>
        <div class="motiv-stat-lbl">Active</div>
      </div>
      <div class="motiv-divider"></div>
      <div class="motiv-stat">
        <div class="motiv-stat-val muted">${stagesRemaining}</div>
        <div class="motiv-stat-lbl">Remaining</div>
      </div>
      <div class="motiv-divider"></div>
      <div class="motiv-stat">
        <div class="motiv-stat-val" style="color:var(--text)">${pct}%</div>
        <div class="motiv-stat-lbl">Tasks Done</div>
      </div>
    </div>

    <div class="motiv-headline">${msg.headline}</div>

    <div class="motiv-ekg">
      <svg class="ekg-svg" viewBox="0 0 760 80" xmlns="http://www.w3.org/2000/svg">
        <!-- dashed baseline -->
        <line class="ekg-baseline" x1="0" y1="54" x2="760" y2="54"/>
        <!-- Realistic EKG: two beats for seamless loop
             Anatomy: long TP flat → P wave → PR flat → Q dip → R spike → S dip → ST flat → T wave → long TP flat
        -->
        <path class="ekg-path" d="
          M 0,54
          L 74,54
          Q 82,43 90,54
          L 110,54
          L 114,58
          L 118,9
          L 122,65
          L 127,54
          L 148,54
          C 156,38 172,36 186,54
          L 380,54
          L 454,54
          Q 462,43 470,54
          L 490,54
          L 494,58
          L 498,9
          L 502,65
          L 507,54
          L 528,54
          C 536,38 552,36 566,54
          L 760,54
        "/>
      </svg>
    </div>

    <div class="motiv-sub">${msg.sub}</div>

    <div class="dz-hint-row">
      <svg class="dz-hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="dz-hint-text">Drop daily .md file here to load your log</span>
    </div>
  `;
}

// ── INIT ──────────────────────────────────────────────────
loadStorage();

// Apply saved check-state overrides to default tasks
const defChecks = checkStates['__default__'] || {};
STAGES.forEach(s => {
  (s.defaultTasks || []).forEach(t => {
    const key = `${s.n}::${t.text}`;
    if (defChecks[key] !== undefined) t.done = defChecks[key];
  });
});

renderStages();
renderMotiv();
renderHistory();
if (logs.length) openLog(0);
</script>
